openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Email Marketing Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard statistics
  - name: contacts
    description: Contact management
  - name: groups
    description: Contact groups
  - name: templates
    description: Email templates
  - name: smtp
    description: SMTP account management
  - name: campaigns
    description: Campaign management
  - name: logs
    description: Email logs
  - name: reports
    description: Reports and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      summary: Recent campaign activity feed
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── Contacts ───────────────────────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contacts
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: groupId
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Paginated contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactList"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /contacts/bulk-delete:
    post:
      operationId: bulkDeleteContacts
      tags: [contacts]
      summary: Bulk delete contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteInput"
      responses:
        "200":
          description: Deleted count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResult"

  # ── Contact Groups ─────────────────────────────────────────────────────────
  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List contact groups
      responses:
        "200":
          description: Groups list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactGroup"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a contact group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactGroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactGroup"

  /groups/{id}:
    patch:
      operationId: updateGroup
      tags: [groups]
      summary: Update a group
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactGroupUpdate"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactGroup"
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  # ── Templates ──────────────────────────────────────────────────────────────
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List email templates
      responses:
        "200":
          description: Templates list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailTemplate"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create an email template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTemplateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a template
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTemplateUpdate"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /templates/{id}/duplicate:
    post:
      operationId: duplicateTemplate
      tags: [templates]
      summary: Duplicate a template
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Duplicated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

  # ── SMTP Accounts ─────────────────────────────────────────────────────────
  /smtp:
    get:
      operationId: listSmtpAccounts
      tags: [smtp]
      summary: List SMTP accounts
      responses:
        "200":
          description: SMTP accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmtpAccount"
    post:
      operationId: createSmtpAccount
      tags: [smtp]
      summary: Add an SMTP account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmtpAccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmtpAccount"

  /smtp/{id}:
    patch:
      operationId: updateSmtpAccount
      tags: [smtp]
      summary: Update SMTP account
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmtpAccountUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmtpAccount"
    delete:
      operationId: deleteSmtpAccount
      tags: [smtp]
      summary: Delete SMTP account
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /smtp/{id}/test:
    post:
      operationId: testSmtpAccount
      tags: [smtp]
      summary: Test SMTP connection
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmtpTestResult"

  /smtp/{id}/toggle:
    patch:
      operationId: toggleSmtpAccount
      tags: [smtp]
      summary: Enable or disable an SMTP account
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmtpToggleInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmtpAccount"

  # ── Campaigns ─────────────────────────────────────────────────────────────
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, scheduled, running, paused, completed, cancelled]
      responses:
        "200":
          description: Campaigns list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignUpdate"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /campaigns/{id}/status:
    patch:
      operationId: updateCampaignStatus
      tags: [campaigns]
      summary: Update campaign status (start, pause, cancel)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignStatusInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  # ── Email Logs ─────────────────────────────────────────────────────────────
  /logs:
    get:
      operationId: listEmailLogs
      tags: [logs]
      summary: List email logs
      parameters:
        - name: campaignId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [sent, failed, pending]
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Email logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLogList"
    delete:
      operationId: clearEmailLogs
      tags: [logs]
      summary: Clear all email logs
      responses:
        "204":
          description: Cleared

  /logs/{id}:
    delete:
      operationId: deleteEmailLog
      tags: [logs]
      summary: Delete an email log
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  # ── Reports ───────────────────────────────────────────────────────────────
  /reports/campaigns:
    get:
      operationId: getCampaignReports
      tags: [reports]
      summary: Campaign performance reports
      responses:
        "200":
          description: Campaign reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignReport"

  /reports/smtp:
    get:
      operationId: getSmtpReports
      tags: [reports]
      summary: SMTP account performance reports
      responses:
        "200":
          description: SMTP reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmtpReport"

  /reports/daily:
    get:
      operationId: getDailyReports
      tags: [reports]
      summary: Daily email volume reports (last 30 days)
      responses:
        "200":
          description: Daily reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyReport"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Dashboard ────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required:
        - totalContacts
        - totalCampaigns
        - emailsSentToday
        - totalEmailsSent
        - pendingQueue
        - failedEmails
        - smtpAccounts
        - successRate
      properties:
        totalContacts: { type: integer }
        totalCampaigns: { type: integer }
        emailsSentToday: { type: integer }
        totalEmailsSent: { type: integer }
        pendingQueue: { type: integer }
        failedEmails: { type: integer }
        smtpAccounts: { type: integer }
        successRate: { type: number }

    ActivityItem:
      type: object
      required: [id, type, message, createdAt]
      properties:
        id: { type: string }
        type: { type: string }
        message: { type: string }
        campaignName: { type: ["string", "null"] }
        createdAt: { type: string }

    # ── Contacts ─────────────────────────────────────────────────────────────
    Contact:
      type: object
      required: [id, email, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: ["string", "null"] }
        email: { type: string }
        company: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        tags:
          type: array
          items: { type: string }
        groupIds:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }

    ContactInput:
      type: object
      required: [email]
      properties:
        name: { type: string }
        email: { type: string }
        company: { type: string }
        phone: { type: string }
        website: { type: string }
        city: { type: string }
        country: { type: string }
        notes: { type: string }
        tags:
          type: array
          items: { type: string }
        groupIds:
          type: array
          items: { type: string }

    ContactUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        company: { type: string }
        phone: { type: string }
        website: { type: string }
        city: { type: string }
        country: { type: string }
        notes: { type: string }
        tags:
          type: array
          items: { type: string }
        groupIds:
          type: array
          items: { type: string }
        isActive: { type: boolean }

    ContactList:
      type: object
      required: [contacts, total, page, limit]
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    BulkDeleteInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: string }

    BulkResult:
      type: object
      required: [deleted]
      properties:
        deleted: { type: integer }

    # ── Contact Groups ────────────────────────────────────────────────────────
    ContactGroup:
      type: object
      required: [id, name, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        contactCount: { type: integer }
        createdAt: { type: string }

    ContactGroupInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }

    ContactGroupUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }

    # ── Templates ─────────────────────────────────────────────────────────────
    EmailTemplate:
      type: object
      required: [id, name, subject, htmlContent, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        subject: { type: string }
        htmlContent: { type: string }
        textContent: { type: ["string", "null"] }
        status:
          type: string
          enum: [draft, active]
        previewText: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    EmailTemplateInput:
      type: object
      required: [name, subject, htmlContent]
      properties:
        name: { type: string }
        subject: { type: string }
        htmlContent: { type: string }
        textContent: { type: string }
        previewText: { type: string }
        status:
          type: string
          enum: [draft, active]

    EmailTemplateUpdate:
      type: object
      properties:
        name: { type: string }
        subject: { type: string }
        htmlContent: { type: string }
        textContent: { type: string }
        previewText: { type: string }
        status:
          type: string
          enum: [draft, active]

    # ── SMTP ──────────────────────────────────────────────────────────────────
    SmtpAccount:
      type: object
      required: [id, name, host, port, username, encryption, isEnabled, priority, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        encryption:
          type: string
          enum: [none, ssl, tls]
        isEnabled: { type: boolean }
        priority: { type: integer }
        hourlyLimit: { type: ["integer", "null"] }
        dailyLimit: { type: ["integer", "null"] }
        sentToday: { type: integer }
        health:
          type: string
          enum: [unknown, healthy, unhealthy]
        imapHost: { type: ["string", "null"] }
        imapPort: { type: integer }
        imapEncryption:
          type: string
          enum: [none, ssl, tls]
        isImapEnabled: { type: boolean }
        createdAt: { type: string }

    SmtpAccountInput:
      type: object
      required: [name, host, port, username, password, encryption]
      properties:
        name: { type: string }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        password: { type: string }
        encryption:
          type: string
          enum: [none, ssl, tls]
        hourlyLimit: { type: integer }
        dailyLimit: { type: integer }
        priority: { type: integer }
        imapHost: { type: string }
        imapPort: { type: integer }
        imapEncryption:
          type: string
          enum: [none, ssl, tls]
        isImapEnabled: { type: boolean }

    SmtpAccountUpdate:
      type: object
      properties:
        name: { type: string }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        password: { type: string }
        encryption:
          type: string
          enum: [none, ssl, tls]
        hourlyLimit: { type: integer }
        dailyLimit: { type: integer }
        priority: { type: integer }
        imapHost: { type: string }
        imapPort: { type: integer }
        imapEncryption:
          type: string
          enum: [none, ssl, tls]
        isImapEnabled: { type: boolean }

    SmtpTestResult:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }

    SmtpToggleInput:
      type: object
      required: [isEnabled]
      properties:
        isEnabled: { type: boolean }

    # ── Campaigns ─────────────────────────────────────────────────────────────
    Campaign:
      type: object
      required: [id, name, subject, senderName, senderEmail, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        subject: { type: string }
        senderName: { type: string }
        senderEmail: { type: string }
        smtpAccountId: { type: ["string", "null"] }
        templateId: { type: ["string", "null"] }
        groupId: { type: ["string", "null"] }
        status:
          type: string
          enum: [draft, scheduled, running, paused, completed, cancelled]
        scheduledAt: { type: ["string", "null"] }
        hourlyLimit: { type: ["integer", "null"] }
        dailyLimit: { type: ["integer", "null"] }
        totalRecipients: { type: integer }
        sentCount: { type: integer }
        failedCount: { type: integer }
        mailsPerBatch: { type: integer }
        intervalMinutes: { type: integer }
        customHtml: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    CampaignInput:
      type: object
      required: [name, subject, senderName, senderEmail]
      properties:
        name: { type: string }
        subject: { type: string }
        senderName: { type: string }
        senderEmail: { type: string }
        smtpAccountId: { type: string }
        templateId: { type: string }
        groupId: { type: string }
        scheduledAt: { type: string }
        hourlyLimit: { type: integer }
        dailyLimit: { type: integer }
        mailsPerBatch: { type: integer }
        intervalMinutes: { type: integer }
        customHtml: { type: string }

    CampaignUpdate:
      type: object
      properties:
        name: { type: string }
        subject: { type: string }
        senderName: { type: string }
        senderEmail: { type: string }
        smtpAccountId: { type: string }
        templateId: { type: string }
        groupId: { type: string }
        scheduledAt: { type: string }
        hourlyLimit: { type: integer }
        dailyLimit: { type: integer }
        mailsPerBatch: { type: integer }
        intervalMinutes: { type: integer }
        customHtml: { type: string }

    CampaignStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [running, paused, cancelled]

    # ── Logs ──────────────────────────────────────────────────────────────────
    EmailLog:
      type: object
      required: [id, recipient, campaignId, status, createdAt]
      properties:
        id: { type: string }
        recipient: { type: string }
        campaignId: { type: string }
        campaignName: { type: ["string", "null"] }
        smtpAccountId: { type: ["string", "null"] }
        status:
          type: string
          enum: [sent, failed, pending]
        retryCount: { type: integer }
        smtpResponse: { type: ["string", "null"] }
        error: { type: ["string", "null"] }
        createdAt: { type: string }

    EmailLogList:
      type: object
      required: [logs, total, page, limit]
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/EmailLog"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # ── Reports ───────────────────────────────────────────────────────────────
    CampaignReport:
      type: object
      required: [campaignId, campaignName, totalRecipients, sentCount, failedCount, successRate]
      properties:
        campaignId: { type: string }
        campaignName: { type: string }
        totalRecipients: { type: integer }
        sentCount: { type: integer }
        failedCount: { type: integer }
        successRate: { type: number }
        status: { type: string }

    SmtpReport:
      type: object
      required: [smtpId, smtpName, totalSent, totalFailed, successRate]
      properties:
        smtpId: { type: string }
        smtpName: { type: string }
        totalSent: { type: integer }
        totalFailed: { type: integer }
        successRate: { type: number }
        health: { type: string }

    DailyReport:
      type: object
      required: [date, sent, failed]
      properties:
        date: { type: string }
        sent: { type: integer }
        failed: { type: integer }
